; ============================================================
;  iTrend Solution — per-directory PHP hardening (.user.ini)
;  Honoured by cPanel / PHP-FPM / CGI hosts. Settings that are
;  PHP_INI_SYSTEM (noted below) must instead be set in cPanel's
;  "MultiPHP INI Editor" or php.ini — they are listed there as a
;  reminder of the intended production values.
; ============================================================

; --- Hide PHP from responses / errors (no version leakage) ---
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On

; --- Upload limits (match the 5 MB resume cap in FormController) ---
upload_max_filesize = 6M
post_max_size = 8M
max_execution_time = 30
max_input_time = 30

; --- RFI hardening ---
; allow_url_fopen / allow_url_include are PHP_INI_SYSTEM, so most hosts
; ignore them here — set them in cPanel "MultiPHP INI Editor" / php.ini.
; The app never includes a remote path, so this is defence in depth only.
allow_url_fopen = Off
allow_url_include = Off

; --- Disable dangerous functions (set in php.ini if your host requires it) ---
; disable_functions = exec,passthru,shell_exec,system,proc_open,popen
